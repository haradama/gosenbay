<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0d12" />
    <title>Senbay Web Camera</title>
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <h1 class="brand-title">Senbay</h1>
            <p class="brand-subtitle">Sensor-embedded camera</p>
          </div>
        </div>

        <span
          id="recordingStatus"
          class="recording-status"
          hidden
          aria-live="polite"
        >
          <span class="recording-dot"></span>
          <span>REC <span id="recordingElapsed">00:00</span></span>
        </span>
      </header>

      <section class="preview">
        <div class="preview-frame">
          <video id="cameraVideo" playsinline muted></video>
          <canvas id="outputCanvas"></canvas>

          <div id="qrMoveHint" class="qr-move-hint">
            <svg
              class="hint-icon"
              viewBox="0 0 24 24"
              width="14"
              height="14"
              aria-hidden="true"
            >
              <path
                fill="currentColor"
                d="M12 2 8 6h3v5H6V8L2 12l4 4v-3h5v5H8l4 4 4-4h-3v-5h5v3l4-4-4-4v3h-5V6h3z"
              />
            </svg>
            Drag the QR code to move it
          </div>
        </div>
      </section>

      <section class="toolbar" aria-label="Controls">
        <button id="startCamera" class="btn btn-primary">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path
              fill="currentColor"
              d="M9 4 7 6H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-3l-2-2H9zm3 5a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"
            />
          </svg>
          <span>Start Camera</span>
        </button>

        <button id="enableSensors" class="btn btn-secondary">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path
              fill="currentColor"
              d="M12 2a10 10 0 1 0 10 10h-2a8 8 0 1 1-8-8V2zm0 4a6 6 0 1 0 6 6h-2a4 4 0 1 1-4-4V6zm0 4a2 2 0 1 0 2 2 2 2 0 0 0-2-2z"
            />
          </svg>
          <span>Enable Sensors</span>
        </button>

        <span class="toolbar-divider" aria-hidden="true"></span>

        <button id="startRecording" class="btn btn-record">
          <span class="btn-rec-dot" aria-hidden="true"></span>
          <span>Record</span>
        </button>

        <button id="stopRecording" class="btn btn-stop" disabled>
          <span class="btn-stop-square" aria-hidden="true"></span>
          <span>Stop</span>
        </button>

        <a id="downloadLink" class="btn btn-download" hidden>
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path
              fill="currentColor"
              d="M12 3v10.59l3.3-3.3 1.4 1.42L12 16.41l-4.7-4.7 1.4-1.42 3.3 3.3V3h2zM5 19h14v2H5v-2z"
            />
          </svg>
          <span>Download Video</span>
        </a>
      </section>

      <details class="debug">
        <summary class="debug-summary">
          <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
            <path
              fill="currentColor"
              d="M9 5h6v2H9V5zm-2 4h10v2H7V9zm-2 4h14v2H5v-2zm2 4h10v2H7v-2z"
            />
          </svg>
          <span>Debug</span>
        </summary>

        <div class="debug-grid">
          <div class="debug-card">
            <h2 class="debug-card-title">Senbay Payload</h2>
            <pre id="payloadView">{}</pre>
          </div>
          <div class="debug-card">
            <h2 class="debug-card-title">Encoded</h2>
            <pre id="encodedView"></pre>
          </div>
        </div>
      </details>
    </main>

    <script src="%BASE_URL%wasm_exec.js"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
